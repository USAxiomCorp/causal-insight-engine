# ═══════════════════════════════════════════════════════════════════════════════
# DOCKER COMPOSE — CAUSAL INSIGHT ENGINE
# ═══════════════════════════════════════════════════════════════════════════════

version: '3.8'

services:
  causal-insight:
    build: .
    container_name: causal-insight-engine
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
